name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

jobs:
  # Build native binaries on each target architecture
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            arch: amd64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-${{ matrix.target }}-

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # Upload original binaries for Docker (keyed by arch)
      - name: Upload Docker binaries
        uses: actions/upload-artifact@v4
        with:
          name: docker-${{ matrix.arch }}
          path: |
            dist/bound
            dist/boundctl
            dist/bound-mcp
            dist/boundcurl
          if-no-files-found: error

      - name: Rename binaries for release
        run: |
          for bin in bound boundctl bound-mcp boundcurl; do
            cp dist/$bin dist/${bin}-${{ matrix.target }}
          done

      - name: Upload release binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/*-${{ matrix.target }}
          if-no-files-found: error

  # Multi-platform Docker image pushed to GHCR
  # Uses pre-built native binaries — no compilation inside Docker, no QEMU overhead.
  docker:
    name: Docker
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download amd64 binaries
        uses: actions/download-artifact@v4
        with:
          name: docker-amd64
          path: binaries/amd64

      - name: Download arm64 binaries
        uses: actions/download-artifact@v4
        with:
          name: docker-arm64
          path: binaries/arm64

      - name: Make binaries executable
        run: chmod +x binaries/amd64/* binaries/arm64/*

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Create GitHub release and attach all binaries
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
