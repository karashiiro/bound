name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

jobs:
  # Build native binaries and per-platform Docker image on each target architecture.
  # No QEMU — each runner builds natively for its own platform.
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            arch: amd64
            platform: linux/amd64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-${{ matrix.target }}-

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # Stage binaries for Docker context
      - name: Stage binaries for Docker
        run: |
          mkdir -p binaries/${{ matrix.arch }}
          cp dist/bound dist/boundctl dist/bound-mcp binaries/${{ matrix.arch }}/

      # Build and push per-platform Docker image (native, no QEMU)
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,scope=${{ matrix.target }},mode=max

      # Upload binaries for GitHub release
      - name: Rename binaries for release
        run: |
          for bin in bound boundctl bound-mcp; do
            cp dist/$bin dist/${bin}-${{ matrix.target }}
          done

      - name: Upload release binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/*-${{ matrix.target }}
          if-no-files-found: error

  # Combine per-platform images into multi-arch manifest
  docker-manifest:
    name: Docker Manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifests
        run: |
          REPO="ghcr.io/${{ github.repository }}"
          VERSION="${{ github.ref_name }}"
          AMD64="${REPO}:${VERSION}-amd64"
          ARM64="${REPO}:${VERSION}-arm64"

          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create -t "$tag" "$AMD64" "$ARM64"
          done <<< "$TAGS"
        env:
          TAGS: ${{ steps.meta.outputs.tags }}

  # Create GitHub release and attach all binaries
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
